<div class="app-shell" [class.app-shell--sidebar-open]="sidebarOpen()">
  @if (showBackdrop()) {
    <button
      type="button"
      class="app-shell__backdrop"
      aria-label="Cerrar navegacion"
      (click)="closeSidebar()"
    ></button>
  }

  <aside
    class="rail"
    aria-label="Navegacion principal"
    [class.rail--open]="sidebarOpen()"
    [class.rail--mobile]="mobileViewport()"
  >
    <div class="rail__brand">
      <span class="rail__eyebrow">shell operativo</span>
      <strong>IMPITrack</strong>
      <p>Vistas de telemetria listas para crecer por feature, no por parches.</p>
    </div>

    <nav class="rail__nav">
      @for (item of visibleItems(); track item.route) {
        <a
          [routerLink]="item.route"
          routerLinkActive="rail__link--active"
          class="rail__link"
          (click)="closeSidebar()"
        >
          <i [class]="item.icon"></i>
          <span>{{ item.label }}</span>
        </a>
      }
    </nav>

    <div class="rail__status">
      <span class="rail__eyebrow">roles</span>
      <div class="rail__tags">
        @for (role of roles(); track role) {
          <p-tag [value]="role"></p-tag>
        }
      </div>
    </div>
  </aside>

  <div class="canvas">
    <header class="canvas__header">
      <div class="canvas__heading">
        <button
          pButton
          type="button"
          icon="pi pi-bars"
          severity="secondary"
          class="canvas__menu-toggle"
          aria-label="Alternar menu lateral"
          (click)="toggleSidebar()"
        ></button>
      </div>

      <div class="canvas__actions">
        <strong class="canvas__display-name">{{ displayName() }}</strong>
        <button
          pButton
          type="button"
          severity="secondary"
          icon="pi pi-sign-out"
          aria-label="Cerrar sesion"
          (click)="signOut()"
        ></button>
      </div>
    </header>

    <main class="canvas__content">
      <router-outlet />
    </main>
  </div>
</div>
