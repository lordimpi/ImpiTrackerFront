<div class="app-shell">
  <aside class="icon-rail">
    <div class="icon-rail__logo">
      <i class="pi pi-map-marker"></i>
    </div>
    <nav class="icon-rail__nav">
      @for (item of visibleItems(); track item.route) {
        <a
          class="icon-rail__item"
          [routerLink]="item.route"
          routerLinkActive="icon-rail__item--active"
          [attr.aria-label]="item.label"
        >
          <i [class]="item.icon"></i>
          <span class="icon-rail__label">{{ item.label }}</span>
        </a>
      }
    </nav>
    <div class="icon-rail__spacer"></div>
    <div class="icon-rail__footer">
      <div class="icon-rail__avatar">{{ displayName().charAt(0).toUpperCase() }}</div>
      <span class="icon-rail__user-name">{{ displayName() }}</span>
      <button class="icon-rail__logout" (click)="signOut()" aria-label="Cerrar sesión">
        <i class="pi pi-sign-out"></i>
      </button>
    </div>
  </aside>

  <div class="canvas">
    <main class="canvas__content canvas__content--fullscreen">
      <router-outlet />
    </main>
  </div>
</div>
