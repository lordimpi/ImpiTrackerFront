<div class="public-shell">
  <section class="signal-panel" aria-label="IMPITrack">
    <div class="signal-panel__badge">plataforma de telemetría GPS</div>
    <h1>{{ headline() }}</h1>
    <p class="signal-panel__lead">
      Telemetría GPS en tiempo real. Recorridos, eventos e ignición en una sola vista.
    </p>

    <div class="signal-panel__grid" aria-hidden="true">
      <div class="signal-panel__metric">
        <span class="metric-label">Telemetría</span>
        <strong>Tiempo real</strong>
      </div>
      <div class="signal-panel__metric">
        <span class="metric-label">Recorridos</span>
        <strong>Histórico completo</strong>
      </div>
      <div class="signal-panel__metric">
        <span class="metric-label">Plataforma</span>
        <strong>100% web</strong>
      </div>
    </div>
  </section>

  <section class="auth-panel">
    <router-outlet />
  </section>
</div>
