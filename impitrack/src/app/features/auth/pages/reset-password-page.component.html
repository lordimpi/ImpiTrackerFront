<div class="app-loading-region auth-card-shell" [attr.aria-busy]="pending()">
  <p-card class="auth-card">
    <ng-template pTemplate="title">Restablecer contrasena</ng-template>
    <ng-template pTemplate="subtitle">
      Define una nueva contrasena para tu cuenta usando el enlace recibido por correo.
    </ng-template>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <label class="field">
        <span>Nueva contrasena</span>
        <p-password
          formControlName="newPassword"
          [toggleMask]="true"
          [feedback]="false"
          autocomplete="new-password"
          inputStyleClass="auth-password-input"
        />
        <div class="password-rules">
          <span class="password-rule" [class.password-rule--ok]="passwordRules().minLength">
            Minimo 8 caracteres
          </span>
          <span class="password-rule" [class.password-rule--ok]="passwordRules().uppercase">
            Una letra mayuscula
          </span>
          <span class="password-rule" [class.password-rule--ok]="passwordRules().lowercase">
            Una letra minuscula
          </span>
          <span class="password-rule" [class.password-rule--ok]="passwordRules().digit">
            Un numero
          </span>
          <span class="password-rule" [class.password-rule--ok]="passwordRules().symbol">
            Un simbolo, por ejemplo . o !
          </span>
        </div>
      </label>

      <label class="field">
        <span>Confirmar contrasena</span>
        <p-password
          formControlName="confirmPassword"
          [toggleMask]="true"
          [feedback]="false"
          autocomplete="new-password"
          inputStyleClass="auth-password-input"
        />
        @if (passwordMismatch()) {
          <small>Las contrasenas deben coincidir antes de enviar.</small>
        }
      </label>

      @if (submitError()) {
        <p-message severity="error" [text]="submitError() ?? ''"></p-message>
      }

      <button
        pButton
        type="submit"
        label="Restablecer contrasena"
        [disabled]="pending()"
        class="auth-submit"
      ></button>
    </form>

    <div class="auth-links">
      <a routerLink="/auth/login">Volver al inicio de sesion</a>
      <a routerLink="/auth/recover-password">Solicitar nuevo enlace</a>
    </div>
  </p-card>

  @if (pending()) {
    <app-loading-spinner mode="screen" label="Actualizando contrasena..." />
  }
</div>
