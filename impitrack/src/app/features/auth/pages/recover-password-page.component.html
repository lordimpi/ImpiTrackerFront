<div class="app-loading-region auth-card-shell" [attr.aria-busy]="pending()">
  <p-card class="auth-card">
    <ng-template pTemplate="title">Recuperar contrasena</ng-template>
    <ng-template pTemplate="subtitle">
      Ingresa el correo de tu cuenta y te enviaremos un enlace para continuar con el restablecimiento.
    </ng-template>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <label class="field">
        <span>Correo</span>
        <input pInputText type="email" formControlName="email" autocomplete="email" />
        @if (form.controls.email.invalid && form.controls.email.touched) {
          <small>Ingresa un correo valido.</small>
        }
      </label>

      @if (submitError()) {
        <p-message severity="error" [text]="submitError() ?? ''"></p-message>
      }

      @if (successMessage()) {
        <p-message severity="success" [text]="successMessage() ?? ''"></p-message>
      }

      <button
        pButton
        type="submit"
        label="Enviar enlace"
        [disabled]="pending()"
        class="auth-submit"
      ></button>
    </form>

    <div class="auth-links">
      <a routerLink="/auth/login">Volver al inicio de sesion</a>
      <a routerLink="/auth/register">Crear cuenta</a>
    </div>
  </p-card>

  @if (pending()) {
    <app-loading-spinner mode="screen" label="Enviando enlace..." />
  }
</div>
