<div class="app-loading-region auth-card-shell" [attr.aria-busy]="pending()">
  <p-card class="auth-card">
    <ng-template pTemplate="title">Crear cuenta de telemetria</ng-template>
    <ng-template pTemplate="subtitle">
      El registro inicial es simple; la gestion de usuarios y planes crecera despues dentro del
      modulo de administracion.
    </ng-template>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      <label class="field">
        <span>Nombre de usuario</span>
        <input pInputText formControlName="userName" autocomplete="username" />
        @if (form.controls.userName.invalid && form.controls.userName.touched) {
          <small>Ingresa un nombre de usuario de al menos 3 caracteres.</small>
        }
      </label>

      <label class="field">
        <span>Nombre completo</span>
        <input pInputText formControlName="fullName" autocomplete="name" />
      </label>

      <label class="field">
        <span>Correo</span>
        <input pInputText type="email" formControlName="email" autocomplete="email" />
        @if (form.controls.email.invalid && form.controls.email.touched) {
          <small>Ingresa un correo valido.</small>
        }
      </label>

      <label class="field">
        <span>Contrasena</span>
        <p-password
          formControlName="password"
          [toggleMask]="true"
          [feedback]="false"
          autocomplete="new-password"
          inputStyleClass="auth-password-input"
        />
        <div class="password-rules">
          <span class="password-rule" [class.password-rule--ok]="passwordRules().minLength">
            Minimo 8 caracteres
          </span>
          <span class="password-rule" [class.password-rule--ok]="passwordRules().uppercase">
            Una letra mayuscula
          </span>
          <span class="password-rule" [class.password-rule--ok]="passwordRules().lowercase">
            Una letra minuscula
          </span>
          <span class="password-rule" [class.password-rule--ok]="passwordRules().digit">
            Un numero
          </span>
          <span class="password-rule" [class.password-rule--ok]="passwordRules().symbol">
            Un simbolo, por ejemplo . o !
          </span>
        </div>
      </label>

      <label class="field">
        <span>Confirmar contrasena</span>
        <p-password
          formControlName="confirmPassword"
          [toggleMask]="true"
          [feedback]="false"
          autocomplete="new-password"
          inputStyleClass="auth-password-input"
        />
        @if (passwordMismatch()) {
          <small>Las contrasenas deben coincidir antes de enviar.</small>
        }
      </label>

      @if (submitError()) {
        <p-message severity="error" [text]="submitError() ?? ''"></p-message>
      }

      <button
        pButton
        type="submit"
        label="Crear cuenta"
        [disabled]="pending()"
        class="auth-submit"
      ></button>
    </form>

    <div class="auth-links">
      <a routerLink="/auth/login">Volver al inicio de sesion</a>
      <a routerLink="/auth/recover-password">Recuperar contrasena</a>
    </div>
  </p-card>

  @if (pending()) {
    <app-loading-spinner mode="screen" label="Creando tu cuenta..." />
  }
</div>
